<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; overflow: hidden; }
        .vh-100 { height: 100vh; }
        .numero-gigante { font-size: 8rem; font-weight: 900; line-height: 1; }
        .modulo-texto { font-size: 3rem; }
    </style>
</head>
<body>
    <div class="container-fluid vh-100 p-0">
        <div class="row h-100 m-0">
            <div class="col-4 bg-dark border-end border-secondary p-4 d-flex flex-column">
                <h2 class="text-center text-warning mb-4">Siguientes</h2>
                <ul class="list-group list-group-flush fs-3">
                    <li class="list-group-item bg-transparent text-white border-secondary">35F</li>
                    <li class="list-group-item bg-transparent text-white border-secondary">13FP</li>
                    <li class="list-group-item bg-transparent text-white border-secondary">36F</li>
                    <li class="list-group-item bg-transparent text-white border-secondary">37F</li>
                </ul>
            </div>

            <div class="col-8 p-0 d-flex flex-column">
                <div class="h-50 bg-primary d-flex flex-column justify-content-center align-items-center border-bottom border-dark">
                    <div class="modulo-texto">FARMACIA COMÚN</div>
                    <div class="numero-gigante text-warning blink-me">34F</div>
                    <div class="fs-1">Módulo 1</div>
                </div>
                <div class="h-50 bg-success d-flex flex-column justify-content-center align-items-center">
                    <div class="modulo-texto">FARMACIA PREFERENCIAL</div>
                    <div class="numero-gigante text-warning">12FP</div>
                    <div class="fs-1">Módulo 2</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

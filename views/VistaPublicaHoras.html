<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Médicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; overflow: hidden; }
        .vh-100 { height: 100vh; }
        .paciente-gigante { font-size: 4rem; font-weight: bold; line-height: 1.2; text-align: center; }
        .doctor-texto { font-size: 2rem; color: #a8d5ff; }
        .box-atencion { border-radius: 15px; background-color: #0b2e59; border: 2px solid #1c5296; }
    </style>
</head>
<body>
    <div class="container-fluid vh-100 p-0">
        <div class="row h-100 m-0">
            <div class="col-4 bg-dark border-end border-secondary p-4 d-flex flex-column">
                <h2 class="text-center text-info mb-4">Siguientes</h2>
                <ul class="list-group list-group-flush fs-4">
                    <li class="list-group-item bg-transparent text-white border-secondary">María González</li>
                    <li class="list-group-item bg-transparent text-white border-secondary">Pedro Rojas</li>
                    <li class="list-group-item bg-transparent text-white border-secondary">Camila Silva</li>
                </ul>
            </div>

            <div class="col-8 p-4 d-flex flex-column justify-content-around">
                <div class="box-atencion p-4 shadow-lg mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="doctor-texto">👨‍⚕️ Dr. Juan Pérez</div>
                        <div class="badge bg-primary fs-2">Box 1</div>
                    </div>
                    <div class="paciente-gigante text-warning">ROBERTO SOTO</div>
                </div>

                <div class="box-atencion p-4 shadow-lg">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="doctor-texto">👩‍⚕️ Dra. Ana Silva</div>
                        <div class="badge bg-success fs-2">Box 2</div>
                    </div>
                    <div class="paciente-gigante text-warning">LUIS MARTÍNEZ</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

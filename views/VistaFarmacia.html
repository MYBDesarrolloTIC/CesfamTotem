<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Panel de Atención - Módulo 1 (Farmacia)</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">Llamar Paciente</div>
                    <div class="card-body d-grid gap-3">
                        <button class="btn btn-success btn-lg">Llamar: COMÚN</button>
                        <button class="btn btn-warning btn-lg">Llamar: PREFERENCIAL</button>
                        <hr>
                        <button class="btn btn-outline-secondary">Volver a llamar (Voz)</button>
                        <button class="btn btn-outline-danger">Marcar Ausente</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Fila Actual</div>
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover m-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Ticket</th>
                                    <th>RUT</th>
                                    <th>Tipo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>13FP</strong></td>
                                    <td>10.456.789-0</td>
                                    <td><span class="badge bg-warning text-dark">Preferencial</span></td>
                                </tr>
                                <tr>
                                    <td><strong>35F</strong></td>
                                    <td>19.123.456-7</td>
                                    <td><span class="badge bg-primary">Común</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

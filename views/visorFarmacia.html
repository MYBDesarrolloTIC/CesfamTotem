<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Visor de Farmacia — CESFAM</title>
    
    <!-- Asegúrate de crear este archivo o nombrarlo como prefieras -->
    <link rel="stylesheet" href="assets/css/visor-farmacia.css" />
</head>
<body>

    <header class="visor-header">
        <h1 class="visor-titulo">CESFAM &mdash; FARMACIA</h1>
        
        <!-- Agrupamos el reloj y el botón de tema -->
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div class="visor-reloj" id="reloj" aria-live="polite"></div>
            <!-- Botón de Tema (Misma clase que usas en Styles.css) -->
            <button id="btn-theme-toggle" class="theme-btn" title="Cambiar a Tema Claro">☀️</button>
        </div>
    </header>

    <main class="visor-grid">
        <!-- El ID area-farmacia es detectado automáticamente por tu visor.js -->
        <section class="area-card" id="area-farmacia">
            <h2 class="area-titulo">Turnos en Atención</h2>
            
            <!-- DATOS VACÍOS: Aquí inyectará el JS -->
            <div class="modulo-contenedor" aria-label="Turnos Farmacia"></div>
        </section>
    </main>

    <!-- Tu JS original -->
    <script type="module" src="assets/js/visor.js"></script>
    
    <!-- Lógica del botón Tema Claro/Oscuro -->
    <script>
        const btnTheme = document.getElementById('btn-theme-toggle');
        
        // Cargar preferencia guardada
        if (localStorage.getItem('cesfam_theme') === 'light') {
            document.body.classList.add('light-theme');
            btnTheme.textContent = '🌙';
        }
        
        // Evento de cambio
        btnTheme.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('cesfam_theme', isLight ? 'light' : 'dark');
            btnTheme.textContent = isLight ? '🌙' : '☀️';
        });
    </script>
</body>
</html>

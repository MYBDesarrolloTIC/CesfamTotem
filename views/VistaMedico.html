<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-info mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 text-dark fw-bold">Panel Médico - Dr. Juan Pérez (Box 1)</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">Llamado</div>
                    <div class="card-body d-grid gap-3">
                        <button class="btn btn-success btn-lg">Llamar Siguiente de la Lista</button>
                        <hr>
                        <button class="btn btn-outline-secondary">Repetir llamado por voz</button>
                        <button class="btn btn-outline-danger">Paciente Ausente</button>
                        <button class="btn btn-outline-info">Derivar a Farmacia</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Pacientes Agendados</div>
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover m-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Hora</th>
                                    <th>Paciente</th>
                                    <th>RUT</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>10:00</td>
                                    <td><strong>Roberto Soto</strong></td>
                                    <td>12.345.678-9</td>
                                    <td><span class="badge bg-success">En Box</span></td>
                                </tr>
                                <tr>
                                    <td>10:15</td>
                                    <td>María González</td>
                                    <td>11.222.333-4</td>
                                    <td><span class="badge bg-warning text-dark">En Espera</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
